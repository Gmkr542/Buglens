services:
  - type: web
    name: bugfalse-fastapi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_URL
        value: https://api.groq.com/openai/v1/chat/completions
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VERIFY_SSL
        value: "true"
